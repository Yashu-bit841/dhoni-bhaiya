<html>

<head>
    <title>Mera card</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }

        body {
            background-color: yellow;
            width: 100vw;
            height: 100vh;
            display: grid;
            place-content: center;
        }

        div {
            background-color: black;
            width: 400px;
            border-radius: 10px;
            text-align: center;
        }

        img {
            width: 400px;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
        }

        a {
            font-size: 40px;
            background-color: yellow;
            display: block;
            margin: 10px;
            padding: 10px;
            border-radius: 10px;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div>
        <img src="dhoni.jpeg" alt="Dhoni bhaiya ka photo">

        <a href="https://instagram.com/mahi7781"> @mahi7781</a>
    </div>
</body>

</html>
